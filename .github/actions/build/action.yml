name: "Build"
description: "Build complete TiXL release (Player published + Editor)"
runs:
  using: "composite"
  steps:
    - name: Setup .NET SDK for CI
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.203'

    - name: Display .NET SDK Version used in CI
      shell: pwsh
      run: |
        Write-Host "CI is using .NET SDK Version:"
        dotnet --version

    - name: Build Release
      shell: pwsh
      run: pwsh Installer/build-release.ps1
